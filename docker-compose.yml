# Coolify deployment.
#
# Coolify runs its own reverse proxy (Traefik) on ports 80/443 shared across
# every app it manages, so this file intentionally does NOT bind any host
# ports or run its own reverse proxy/Caddy — doing so caused
# "port is already allocated" failures.
#
# After deploying, set the domain in the Coolify dashboard for this service
# ("app" service -> Domains -> boscobicycle.com, www.boscobicycle.com),
# port 4095. Coolify auto-generates the Traefik labels and Let's Encrypt
# certificate for you; it picks whatever internal routing it needs, so
# there's nothing to configure here.
#
# Deploying to a plain VPS without Coolify? Use docker-compose.standalone.yml
# instead, which bundles Caddy for automatic HTTPS.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SERVICE_FQDN_APP_4095: https://boscobicycle.com
    expose:
      - "4095"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx:mode=1777
      - /var/run:mode=1777
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
